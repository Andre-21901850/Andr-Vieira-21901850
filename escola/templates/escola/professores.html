{% extends 'escola/base.html' %}

{% block content %}
<h2>Professores</h2>
<section>
    {% for professor in professores %}
    <article>
        <header>
            <h3>{{ professor.nome }}</h3>
            <p>{{ professor.email }}</p>
        </header>
        <section>
            <h4>Turma</h4>
            <ul>
                <li>{{ professor.turma.nome }}</li>
            </ul>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
