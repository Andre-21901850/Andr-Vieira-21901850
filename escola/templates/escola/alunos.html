{% extends 'escola/base.html' %}

{% block content %}
<h2>Alunos</h2>
<section>
    {% for aluno in alunos %}
    <article>
        <header>
            <h3>{{ aluno.nome }}</h3>
            <p>Turma: {{ aluno.turma.nome }}</p>
        </header>
    </article>
    {% endfor %}
</section>
{% endblock %}
