{% extends 'portfolio/base.html' %}

{% block content %}
<h2>Formações</h2>

{% if is_gestor %}
<a href="{% url 'formacao_criar' %}">+ Nova Formação</a>
{% endif %}

<section>
    {% for formacao in formacoes %}
    <article>
        <header>
            <h3>{{ formacao.nome }}</h3>
            <p>{{ formacao.instituicao }} | {{ formacao.data_inicio }}</p>
        </header>
        {% if is_gestor %}
        <section>
            <a href="{% url 'formacao_editar' formacao.id %}">Editar</a>
            <a href="{% url 'formacao_apagar' formacao.id %}">Apagar</a>
        </section>
        {% endif %}
    </article>
    {% endfor %}
</section>
{% endblock %}
