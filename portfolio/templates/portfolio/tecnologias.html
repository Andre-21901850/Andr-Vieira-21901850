{% extends 'portfolio/base.html' %}

{% block content %}
<h2>Tecnologias</h2>
<section>
    {% for tecnologia in tecnologias %}
    <article>
        <header>
            <h3>{{ tecnologia.nome }}</h3>
            <p>{{ tecnologia.categoria }}</p>
        </header>
        <section>
            <h4>Nível</h4>
            <ul>
                <li>{{ tecnologia.get_nivel_interesse_display }}</li>
            </ul>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
