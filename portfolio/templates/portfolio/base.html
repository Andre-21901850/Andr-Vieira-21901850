<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - André Vieira</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">
</head>
<body>
    <header>
        <h1>André Vieira</h1>
        <nav>
            <a href="{% url 'portfolio' %}">Início</a>
            <a href="{% url 'ucs' %}">Unidades Curriculares</a>
            <a href="{% url 'projetos' %}">Projetos</a>
            <a href="{% url 'tecnologias' %}">Tecnologias</a>
            <a href="{% url 'tfcs' %}">TFCs</a>
            <a href="{% url 'competencias' %}">Competências</a>
            <a href="{% url 'formacoes' %}">Formações</a>
            <a href="{% url 'sobre' %}">Sobre</a>
            <a href="{% url 'artigos' %}">Artigos</a>
            {% if request.user.is_authenticated %}
                <span>Olá, {{ request.user.username }}</span>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        © 2026 André Vieira
    </footer>
</body>
</html>
